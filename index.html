<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fretslayer · Guitar Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <div id="splash" role="dialog" aria-label="Loading">
      <img src="/splash.jpg" alt="The Goblin Has Cursed the Fretboard" class="splash-art" />
      <p class="splash-msg">⚡ Summoning the riff…</p>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
      <p class="splash-skip">click anywhere to skip</p>
    </div>

    <header class="site-header">
      <div class="wordmark">
        <span class="mark">◗</span>
        <span class="name">Fretslayer</span>
      </div>
      <p class="tagline">Learn the fretboard — by heart.</p>
    </header>

    <figure class="epigraph" id="epigraph"></figure>

    <nav class="segmented" id="tabs" role="tablist">
      <button class="tab" data-view="guided" role="tab" aria-selected="true">Guided Path</button>
      <button class="tab" data-view="find" role="tab" aria-selected="false">Find Notes</button>
      <button class="tab" data-view="name" role="tab" aria-selected="false">Name the Note</button>
      <button class="tab" data-view="play" role="tab" aria-selected="false">🎤 Play</button>
      <button class="tab" data-view="open" role="tab" aria-selected="false">Open Scales</button>
      <button class="tab" data-view="shapes" role="tab" aria-selected="false">5 Shapes</button>
      <button class="tab" data-view="caged" role="tab" aria-selected="false">CAGED Shapes</button>
    </nav>

    <div class="skins" id="skins" aria-label="Neck style">
      <span class="skins-label">Neck</span>
      <button class="skin" data-skin="studio"><i></i>Studio</button>
      <button class="skin" data-skin="acoustic"><i></i>Acoustic</button>
      <button class="skin" data-skin="electric"><i></i>Electric</button>
      <button class="skin" data-skin="metal"><i></i>Metal</button>
    </div>

    <main id="app"></main>

    <footer class="site-footer">
      <span class="future">New here? Start with the Guided Path. 🎤 Play mode needs mic access (Safari on iPhone/iPad).</span>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
